<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Myverse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* ── 차분한 딥 네이비 팔레트 ── */
  --bg:  #1E2642;   /* 페이지 배경 — 깊고 차분한 네이비 */
  --bg2: #28305A;   /* 카드·패널 배경 */
  --bg3: #333D6E;   /* 인풋·호버 배경 */
  --border:  rgba(255,255,255,0.09);
  --border2: rgba(255,255,255,0.16);
  --text:  #E8ECF8;
  --text2: #A8B4D8;
  --text3: #6470A0;
  --accent:  #7B9FE0;
  --accent2: #9AB8F0;
  --c-work:   #7B9FE0; --c-work-bg:   rgba(123,159,224,0.13); --c-work-bg2:  rgba(123,159,224,0.22);
  --c-yt:     #3CBFA0; --c-yt-bg:     rgba(60,191,160,0.12);  --c-yt-bg2:   rgba(60,191,160,0.20);
  --c-learn:  #60AADC; --c-learn-bg:  rgba(96,170,220,0.12);  --c-learn-bg2: rgba(96,170,220,0.20);
  --c-health: #68C268; --c-health-bg: rgba(104,194,104,0.12); --c-health-bg2:rgba(104,194,104,0.20);
  --c-money:  #D4A84B; --c-money-bg:  rgba(212,168,75,0.12);  --c-money-bg2: rgba(212,168,75,0.20);
  --r: 10px; --r2: 14px; --r3: 18px;
  font-size: 16px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Pretendard', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }

/* ─── Layout ─── */
.app { display: flex; flex-direction: column; height: 100vh; max-width: 1280px; margin: 0 auto; }

/* ─── Top Bar ─── */
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0; z-index: 10;
}
.logo { font-size: 18px; font-weight: 600; letter-spacing: -0.03em; margin-right: 8px; }
.logo em { color: var(--accent); font-style: normal; }
.nav-tabs { display: flex; gap: 2px; flex: 1; }
.nav-tab {
  padding: 6px 14px; border-radius: var(--r); font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--text2); transition: all .15s; border: none; background: none;
}
.nav-tab:hover { color: var(--text); background: var(--bg3); }
.nav-tab.active { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.capture-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: var(--r); font-size: 12px; font-weight: 500;
  background: var(--bg3); border: 1px solid var(--border2); color: var(--text2);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.capture-btn:hover { color: var(--text); border-color: var(--accent); }
.capture-btn kbd { background: var(--border); padding: 1px 5px; border-radius: 4px; font-size: 11px; font-family: inherit; }

/* ─── Main content ─── */
.main { flex: 1; overflow: hidden; position: relative; }
.view { position: absolute; inset: 0; overflow-y: auto; display: none; padding: 20px; }
.view.active { display: block; }

/* ─── Card View ─── */
.section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.field-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
  padding: 16px; cursor: pointer; transition: all .18s; position: relative; overflow: hidden;
}
.field-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.field-card.work::before   { background: var(--c-work); }
.field-card.yt::before     { background: var(--c-yt); }
.field-card.learn::before  { background: var(--c-learn); }
.field-card.health::before { background: var(--c-health); }
.field-card.money::before  { background: var(--c-money); }
.field-card:hover { border-color: var(--border2); background: var(--bg3); transform: translateY(-1px); }
.card-icon { font-size: 22px; margin-bottom: 10px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.card-sub { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.prog-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.prog-label { font-size: 11px; color: var(--text3); margin-top: 5px; }
.add-card { border: 1px dashed var(--border2); background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; min-height: 120px; }
.add-card:hover { border-color: var(--accent); background: var(--c-work-bg); }
.add-card span { font-size: 24px; color: var(--text3); }
.add-card p { font-size: 12px; color: var(--text3); }

/* ─── Today list ─── */
.today-list { display: flex; flex-direction: column; gap: 6px; }
.today-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); cursor: pointer; transition: all .15s; }
.today-item:hover { border-color: var(--border2); background: var(--bg3); }
.today-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.today-text { flex: 1; font-size: 13px; }
.today-text.done { text-decoration: line-through; color: var(--text3); }
.today-tag { font-size: 11px; color: var(--text3); }
.checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all .15s; }
.checkbox.checked { background: var(--accent); border-color: var(--accent); }
.checkbox.checked::after { content: '✓'; font-size: 10px; color: white; }

/* ─── Graph View ─── */
#graph-view { padding: 0; overflow: hidden; }
#graph-canvas { width: 100%; height: 100%; cursor: grab; }
#graph-canvas:active { cursor: grabbing; }
.graph-toolbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r2); padding: 8px 12px; z-index: 5; }
.graph-btn { padding: 5px 10px; border-radius: var(--r); font-size: 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all .15s; }
.graph-btn:hover { color: var(--text); border-color: var(--border2); }

/* ─── Node Detail Panel ─── */
.node-panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: 380px;
  background: var(--bg2); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 20;
  transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.node-panel.open { transform: translateX(0); }
.panel-header { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.panel-close { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: all .15s; margin-left: auto; }
.panel-close:hover { background: var(--bg3); color: var(--text); }
.panel-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.panel-title { font-size: 16px; font-weight: 600; flex: 1; }
.panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.panel-section { margin-bottom: 20px; }
.panel-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.panel-content { font-size: 13px; color: var(--text2); line-height: 1.7; }
.prog-section { padding: 12px; background: var(--bg3); border-radius: var(--r); margin-bottom: 20px; }
.prog-section .prog-bar { height: 6px; margin-bottom: 6px; }
.prog-nums { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg3); border-radius: var(--r); }
.task-text { font-size: 13px; color: var(--text); flex: 1; }
.task-text.done { text-decoration: line-through; color: var(--text3); }
.add-task { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--r); cursor: pointer; color: var(--text3); font-size: 13px; border: 1px dashed var(--border2); transition: all .15s; }
.add-task:hover { color: var(--accent2); border-color: var(--accent); background: var(--c-work-bg); }
.connected-nodes { display: flex; flex-wrap: wrap; gap: 6px; }
.conn-chip { padding: 4px 10px; border-radius: 20px; font-size: 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all .15s; }
.conn-chip:hover { border-color: var(--border2); color: var(--text); }

/* ─── Quick Capture Modal ─── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: flex-start; justify-content: center; padding-top: 15vh; }
.overlay.open { display: flex; }
.capture-modal {
  width: 560px; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--r3); overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6); animation: slideDown .2s cubic-bezier(.4,0,.2,1);
}
@keyframes slideDown { from { transform: translateY(-16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.capture-input { width: 100%; background: transparent; border: none; outline: none; padding: 18px 20px; font-size: 16px; color: var(--text); font-family: inherit; }
.capture-input::placeholder { color: var(--text3); }
.capture-divider { height: 1px; background: var(--border); }
.capture-footer { display: flex; align-items: center; gap: 6px; padding: 10px 14px; flex-wrap: wrap; }
.field-chip {
  padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2);
  transition: all .15s; white-space: nowrap;
}
.field-chip:hover { border-color: var(--border2); color: var(--text); }
.save-btn {
  margin-left: auto; padding: 6px 16px; border-radius: var(--r); font-size: 13px; font-weight: 500;
  background: var(--accent); border: none; color: white; cursor: pointer; transition: all .15s;
}
.save-btn:hover { background: var(--accent2); }
.save-btn:disabled { opacity: .4; cursor: default; }
.capture-hint-row { padding: 8px 16px; font-size: 11px; color: var(--text3); display: flex; gap: 16px; border-top: 1px solid var(--border); }

/* ─── Toast ─── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r2); padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 200; transition: transform .3s cubic-bezier(.4,0,.2,1); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ─── Kanban View ─── */
#kanban-view { padding: 0; overflow: hidden; display: none; flex-direction: column; }
#kanban-view.active { display: flex; }
.kanban-topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.kanban-title { font-size: 15px; font-weight: 600; }
.kanban-selector { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
.kanban-tab {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text2); transition: all .15s;
}
.kanban-tab:hover { color: var(--text); border-color: var(--border2); }
.kanban-tab.active { color: white; border-color: transparent; }
.kanban-tab.active.yt     { background: var(--c-yt); }
.kanban-tab.active.work   { background: var(--c-work); }
.kanban-tab.active.learn  { background: var(--c-learn); }
.kanban-tab.active.health { background: var(--c-health); }
.kanban-tab.active.money  { background: var(--c-money); }
.add-kanban-card-btn {
  margin-left: auto; padding: 5px 12px; border-radius: var(--r); font-size: 12px; font-weight: 500;
  background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); cursor: pointer; transition: all .15s;
}
.add-kanban-card-btn:hover { color: var(--text); border-color: var(--accent); }
.kanban-board { display: flex; gap: 10px; padding: 16px 20px; flex: 1; overflow-x: auto; overflow-y: hidden; }
.kanban-col {
  min-width: 220px; flex: 1; background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r2); display: flex; flex-direction: column; max-height: 100%;
}
.kanban-col.drag-over { border-color: var(--accent); background: var(--c-work-bg); }
.col-header { padding: 12px 14px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.col-dot { width: 7px; height: 7px; border-radius: 50%; }
.col-name { font-size: 12px; font-weight: 600; color: var(--text2); flex: 1; }
.col-count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 1px 7px; border-radius: 10px; }
.col-cards { flex: 1; overflow-y: auto; padding: 0 8px 8px; display: flex; flex-direction: column; gap: 6px; }
.kanban-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 12px; cursor: grab; transition: all .15s; user-select: none;
}
.kanban-card:active { cursor: grabbing; opacity: .7; }
.kanban-card:hover { border-color: var(--border2); }
.kanban-card.dragging { opacity: .4; }
.kc-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.kc-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.kc-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; }
.kc-prog { margin-top: 8px; }
.kc-prog-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.kc-prog-fill { height: 100%; border-radius: 2px; }
.kc-prog-label { font-size: 10px; color: var(--text3); }
.col-add { padding: 6px 8px 10px; flex-shrink: 0; }
.col-add-btn { width: 100%; padding: 7px; border-radius: var(--r); font-size: 12px; color: var(--text3); background: none; border: 1px dashed var(--border); cursor: pointer; transition: all .15s; }
.col-add-btn:hover { color: var(--text2); border-color: var(--border2); }

/* ─── Calendar View ─── */
#cal-view { padding: 0; display: none; flex-direction: column; overflow: hidden; }
#cal-view.active { display: flex; }
.cal-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.cal-nav { display: flex; align-items: center; gap: 8px; }
.cal-nav-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.cal-nav-btn:hover { color: var(--text); border-color: var(--border2); }
.cal-month-label { font-size: 15px; font-weight: 600; min-width: 110px; text-align: center; }
.cal-today-btn { padding: 4px 10px; border-radius: var(--r); font-size: 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all .15s; }
.cal-today-btn:hover { color: var(--text); }
.cal-filters { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
.cal-filter {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text2); transition: all .15s;
}
.cal-filter.on { color: white; border-color: transparent; }
.cal-filter.on.work   { background: var(--c-work); }
.cal-filter.on.yt     { background: var(--c-yt); }
.cal-filter.on.learn  { background: var(--c-learn); }
.cal-filter.on.health { background: var(--c-health); }
.cal-filter.on.money  { background: var(--c-money); }
.cal-filter-dot { width: 7px; height: 7px; border-radius: 50%; }
.cal-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--border); }
.cal-weekday { padding: 8px 0; text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; overflow-y: auto; }
.cal-day {
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 6px 6px 4px; min-height: 90px; cursor: pointer; transition: background .12s; position: relative;
}
.cal-day:hover { background: var(--bg3); }
.cal-day.other-month { opacity: .35; }
.cal-day.today .day-num { background: var(--accent); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.day-num { font-size: 12px; color: var(--text2); margin-bottom: 4px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.cal-event { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.cal-more { font-size: 10px; color: var(--text3); padding: 1px 4px; }

/* ─── Event Detail Modal ─── */
.event-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; display: none; align-items: center; justify-content: center; }
.event-modal-overlay.open { display: flex; }
.event-modal { width: 380px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r3); padding: 20px; animation: slideDown .2s cubic-bezier(.4,0,.2,1); }
.event-modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.event-form { display: flex; flex-direction: column; gap: 10px; }
.event-form input, .event-form select, .event-form textarea {
  background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r);
  color: var(--text); font-family: inherit; font-size: 13px; padding: 9px 12px; outline: none; transition: border .15s;
}
.event-form input:focus, .event-form select:focus, .event-form textarea:focus { border-color: var(--accent); }
.event-form select option { background: var(--bg2); }
.event-form textarea { resize: vertical; min-height: 60px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
.modal-cancel { padding: 7px 14px; border-radius: var(--r); font-size: 13px; background: none; border: 1px solid var(--border2); color: var(--text2); cursor: pointer; transition: all .15s; }
.modal-cancel:hover { color: var(--text); }
.modal-save { padding: 7px 16px; border-radius: var(--r); font-size: 13px; font-weight: 500; background: var(--accent); border: none; color: white; cursor: pointer; transition: all .15s; }
.modal-save:hover { background: var(--accent2); }
.modal-delete { padding: 7px 14px; border-radius: var(--r); font-size: 13px; background: none; border: 1px solid rgba(220,60,60,0.3); color: #e05a5a; cursor: pointer; transition: all .15s; margin-right: auto; }
.modal-delete:hover { background: rgba(220,60,60,0.1); }

/* ─── Hierarchical Task Tree ─── */
.project-block { margin-bottom: 14px; border: 1px solid var(--border2); border-radius: var(--r2); overflow: hidden; }
.project-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg3); cursor: pointer; user-select: none; }
.project-toggle { font-size: 11px; color: var(--text3); transition: transform .15s; }
.project-toggle.open { transform: rotate(90deg); }
.project-name { font-size: 13px; font-weight: 600; flex: 1; }
.project-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.project-body { padding: 8px; display: none; }
.project-body.open { display: block; }

.todo-item { margin-bottom: 6px; border-radius: var(--r); overflow: hidden; }
.todo-row { display: flex; align-items: center; gap: 7px; padding: 7px 9px; background: var(--bg2); cursor: pointer; }
.todo-row:hover { background: var(--bg3); }
.todo-toggle { font-size: 10px; color: var(--text3); width: 12px; text-align: center; transition: transform .15s; flex-shrink: 0; }
.todo-toggle.open { transform: rotate(90deg); }
.todo-text { font-size: 12px; flex: 1; }
.todo-text.done { text-decoration: line-through; color: var(--text3); }
.todo-plans { padding: 4px 8px 4px 20px; background: var(--bg); display: none; }
.todo-plans.open { display: block; }

.plan-item { margin-bottom: 4px; border-radius: 6px; overflow: hidden; }
.plan-row { display: flex; align-items: center; gap: 7px; padding: 6px 8px; background: var(--bg2); cursor: pointer; }
.plan-row:hover { background: var(--bg3); }
.plan-toggle { font-size: 9px; color: var(--text3); width: 10px; text-align: center; transition: transform .15s; flex-shrink: 0; }
.plan-toggle.open { transform: rotate(90deg); }
.plan-text { font-size: 11px; flex: 1; }
.plan-text.done { text-decoration: line-through; color: var(--text3); }

function getTodayPlus(days) {
  const d = new Date(); d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function loadData() {
  try {
    const raw = localStorage.getItem('myverse_data');
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    const parsed = JSON.parse(raw);
    // kanban: 키가 없거나 전체가 비어있으면 DEFAULT로 초기화
    if (!parsed.kanban) {
      parsed.kanban = JSON.parse(JSON.stringify(DEFAULT_DATA.kanban));
    } else {
      // 각 기본 분야 칸반이 빈 배열이면 샘플로 채워주기
      Object.keys(DEFAULT_DATA.kanban).forEach(k => {
        if (!parsed.kanban[k] || parsed.kanban[k].length === 0) {
          parsed.kanban[k] = JSON.parse(JSON.stringify(DEFAULT_DATA.kanban[k]));
        }
      });
    }
    if (!parsed.events) parsed.events = JSON.parse(JSON.stringify(DEFAULT_DATA.events));
    if (!parsed.customFields) parsed.customFields = {};
    return parsed;
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function syncFields() {
  FIELDS = { ...DEFAULT_FIELDS, ...(state.customFields || {}) };
}
function saveData() { localStorage.setItem('myverse_data', JSON.stringify(state)); }
function getNode(id) { return state.nodes.find(n => n.id === id); }
function updateNode(id, patch) {
  const idx = state.nodes.findIndex(n => n.id === id);
  if (idx >= 0) { state.nodes[idx] = { ...state.nodes[idx], ...patch }; saveData(); }
}

let state = loadData();
syncFields();

/* ═══════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════ */
const views = document.querySelectorAll('.view');
const navTabs = document.querySelectorAll('.nav-tab');

navTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.view;
    views.forEach(v => v.classList.toggle('active', v.id === target));
    navTabs.forEach(t => t.classList.toggle('active', t === tab));
    if (target === 'graph-view') { setTimeout(initGraph, 50); }
    if (target === 'card-view') { renderCardView(); }
    if (target === 'kanban-view') { renderKanban(); }
    if (target === 'cal-view') { renderCalFilters(); renderCalHeader(); renderCalGrid(); }
  });
});

/* ═══════════════════════════════════════════════
   CARD VIEW
   ═══════════════════════════════════════════════ */
function getTodayTasks() {
  const items = [];
  state.nodes.forEach(node => {
    if (!node.field) return;
    // 계층형 projects에서 미완료 할 일 수집
    (node.projects || []).forEach(proj => {
      (proj.todos || []).forEach(todo => {
        if (!todo.done) items.push({ id: todo.id, text: todo.text, done: todo.done, nodeId: node.id, field: node.field, nodeLabel: node.label });
      });
    });
    // fallback: 구 tasks
    (node.tasks || []).forEach(t => {
      if (!t.done) items.push({ ...t, nodeId: node.id, field: node.field, nodeLabel: node.label });
    });
  });
  return items.slice(0, 8);
}

function getFieldProgress(field) {
  const nodes = state.nodes.filter(n => n.field === field);
  let total = 0, done = 0;
  nodes.forEach(n => {
    (n.projects || []).forEach(proj => {
      (proj.todos || []).forEach(todo => {
        total++; if (todo.done) done++;
        (todo.plans || []).forEach(plan => { total++; if (plan.done) done++; });
      });
    });
    (n.tasks || []).forEach(t => { total++; if (t.done) done++; });
  });
  return { total, done, pct: total === 0 ? 0 : Math.round(done / total * 100) };
}

function renderCardView() {
  const grid = document.getElementById('field-cards');
  grid.innerHTML = '';
  Object.entries(FIELDS).forEach(([key, f]) => {
    const prog = getFieldProgress(key);
    const nodeCount = state.nodes.filter(n => n.field === key).length;
    const el = document.createElement('div');
    el.className = `field-card ${key}`;
    el.innerHTML = `
      <div class="card-icon">${f.icon}</div>
      <div class="card-title">${f.label}</div>
      <div class="card-sub">노드 ${nodeCount}개 · 할 일 ${prog.total}개</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${prog.pct}%;background:${f.color}${prog.pct===100?';background:#639922':''}"></div></div>
      <div class="prog-label">${prog.done}/${prog.total} 완료 (${prog.pct}%)</div>
    `;
    el.addEventListener('click', () => openNodePanel(key));
    grid.appendChild(el);
  });
  const addCard = document.createElement('div');
  addCard.className = 'field-card add-card';
  addCard.innerHTML = '<span>＋</span><p>분야 추가</p>';
  addCard.addEventListener('click', () => openAddFieldModal());
  grid.appendChild(addCard);

  // Today list
  const list = document.getElementById('today-list');
  list.innerHTML = '';
  const tasks = getTodayTasks();
  if (tasks.length === 0) {
    list.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:12px 0">오늘 할 일이 없습니다 🎉</div>';
    return;
  }
  tasks.forEach(t => {
    const f = FIELDS[t.field];
    const el = document.createElement('div');
    el.className = 'today-item';
    el.innerHTML = `
      <div class="checkbox${t.done?' checked':''}" data-task="${t.id}" data-node="${t.nodeId}"></div>
      <div class="today-dot" style="background:${f.color}"></div>
      <div class="today-text${t.done?' done':''}">${t.text}</div>
      <div class="today-tag">${f.label} · ${t.nodeLabel}</div>
    `;
    el.querySelector('.checkbox').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleTask(t.nodeId, t.id);
      renderCardView();
    });
    el.addEventListener('click', () => openNodePanel(t.nodeId));
    list.appendChild(el);
  });
}

function toggleTask(nodeId, taskId) {
  const node = getNode(nodeId);
  if (!node) return;
  const tasks = node.tasks.map(t => t.id === taskId ? { ...t, done: !t.done } : t);
  updateNode(nodeId, { tasks });
}

/* ═══════════════════════════════════════════════
   GRAPH VIEW — Canvas-based
   ═══════════════════════════════════════════════ */
let canvas, ctx;
let camX = 0, camY = 0, camScale = 1;
let isDragging = false, lastMouse = null;
let hoveredNode = null;
let graphReady = false;

/* ── 가상 노드 시스템 ──
   expandedNodes: 더블클릭으로 펼쳐진 노드 id Set
   virtualNodes:  projects/todos/plans에서 동적으로 생성된 노드 배열
*/
let expandedNodes = new Set();
let virtualNodes  = [];   // { id, label, parentId, type, color, bg, x, y, ref }

/* 가상 노드 전체 재계산 */
function rebuildVirtualNodes() {
  virtualNodes = [];

  // 실제 state.nodes 중 expandedNodes에 있는 것을 순회
  state.nodes.forEach(node => {
    if (!expandedNodes.has(node.id)) return;
    const f = node.field ? FIELDS[node.field] : null;
    const color = f ? f.color : '#7B9FE0';
    const bg    = f ? f.bg    : 'rgba(123,159,224,0.13)';

    // 분야 노드(work 등) → 프로젝트 가상 노드
    if (node.field && (node.projects || []).length > 0) {
      const projects = node.projects;
      projects.forEach((proj, i) => {
        const angle = (Math.PI * 2 / projects.length) * i - Math.PI / 2;
        const dist  = 160;
        const vnId  = `vn_proj_${proj.id}`;
        virtualNodes.push({
          id: vnId, label: proj.title.length > 7 ? proj.title.slice(0,7)+'…' : proj.title,
          fullLabel: proj.title,
          parentId: node.id, type: 'project',
          color, bg,
          x: node.x + Math.cos(angle) * dist,
          y: node.y + Math.sin(angle) * dist,
          ref: proj, refNodeId: node.id
        });

        // 프로젝트 가상 노드도 펼쳐져 있으면 → 할일 가상 노드
        if (expandedNodes.has(vnId) && (proj.todos || []).length > 0) {
          proj.todos.forEach((todo, j) => {
            const a2  = (Math.PI * 2 / proj.todos.length) * j - Math.PI / 2;
            const d2  = 130;
            const parentVn = virtualNodes.find(v => v.id === vnId);
            const px = parentVn ? parentVn.x : node.x + Math.cos(angle) * dist;
            const py = parentVn ? parentVn.y : node.y + Math.sin(angle) * dist;
            const vnTodoId = `vn_todo_${todo.id}`;
            const doneColor = todo.done ? '#68C268' : color;
            virtualNodes.push({
              id: vnTodoId, label: todo.text.length > 7 ? todo.text.slice(0,7)+'…' : todo.text,
              fullLabel: todo.text,
              parentId: vnId, type: 'todo',
              color: doneColor, bg,
              x: px + Math.cos(a2) * d2,
              y: py + Math.sin(a2) * d2,
              ref: todo, refNodeId: node.id
            });

            // 할일도 펼쳐져 있으면 → 세부계획 가상 노드
            if (expandedNodes.has(vnTodoId) && (todo.plans || []).length > 0) {
              const todoVn = virtualNodes.find(v => v.id === vnTodoId);
              todo.plans.forEach((plan, k) => {
                const a3 = (Math.PI * 2 / todo.plans.length) * k - Math.PI / 2;
                const d3 = 110;
                const vnPlanId = `vn_plan_${plan.id}`;
                const planColor = plan.done ? '#68C268' : color;
                virtualNodes.push({
                  id: vnPlanId, label: plan.text.length > 7 ? plan.text.slice(0,7)+'…' : plan.text,
                  fullLabel: plan.text,
                  parentId: vnTodoId, type: 'plan',
                  color: planColor, bg,
                  x: (todoVn ? todoVn.x : px) + Math.cos(a3) * d3,
                  y: (todoVn ? todoVn.y : py) + Math.sin(a3) * d3,
                  ref: plan, refNodeId: node.id
                });
              });
            }
          });
        }
      });
    }

    // 일반 하위 노드도 그 아래 프로젝트 확장 지원
    // (w-church 등 field=work 인 서브노드)
    if (!node.field && node.id !== 'me') return; // 이미 위에서 처리
  });
}

/* 가상 노드 id 또는 실제 노드 id로 위치 반환 */
function getNodePos(id) {
  const vn = virtualNodes.find(v => v.id === id);
  if (vn) return { x: vn.x, y: vn.y };
  const rn = getNode(id);
  if (rn) return { x: rn.x, y: rn.y };
  return null;
}

function initGraph() {
  canvas = document.getElementById('graph-canvas');
  const container = document.getElementById('graph-view');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  ctx = canvas.getContext('2d');
  camX = canvas.width / 2;
  camY = canvas.height / 2;
  if (!graphReady) {
    bindGraphEvents();
    graphReady = true;
  }
  rebuildVirtualNodes();
  drawGraph();
}

function worldToScreen(x, y) {
  return { x: x * camScale + camX, y: y * camScale + camY };
}
function screenToWorld(sx, sy) {
  return { x: (sx - camX) / camScale, y: (sy - camY) / camScale };
}

function drawGraph() {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ── 그리드 ──
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 40 * camScale;
  const offX = camX % gridSize, offY = camY % gridSize;
  for (let x = offX; x < canvas.width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for (let y = offY; y < canvas.height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
  ctx.restore();

  // ── 실제 노드 엣지 ──
  state.nodes.forEach(node => {
    node.connectedIds.forEach(cid => {
      const target = getNode(cid);
      if (!target) return;
      // 양방향 중복 방지: id < cid 일 때만 그림
      if (node.id >= cid && !(node.isRoot)) return;
      if (node.isRoot && cid === 'me') return;
      const from = worldToScreen(node.x, node.y);
      const to   = worldToScreen(target.x, target.y);
      const color = node.field ? FIELDS[node.field].color : (target.field ? FIELDS[target.field].color : '#7B9FE0');
      ctx.save();
      ctx.strokeStyle = color; ctx.globalAlpha = 0.22;
      ctx.lineWidth = 1.5 * camScale;
      ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
      ctx.restore();
    });
  });

  // ── 가상 노드 엣지 ──
  virtualNodes.forEach(vn => {
    const fromPos = getNodePos(vn.parentId);
    if (!fromPos) return;
    const from = worldToScreen(fromPos.x, fromPos.y);
    const to   = worldToScreen(vn.x, vn.y);
    ctx.save();
    ctx.strokeStyle = vn.color; ctx.globalAlpha = 0.28;
    ctx.lineWidth = (vn.type === 'project' ? 1.5 : vn.type === 'todo' ? 1.2 : 1) * camScale;
    ctx.setLineDash(vn.type === 'plan' ? [4*camScale, 3*camScale] : []);
    ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });

  // ── 실제 노드 그리기 ──
  const fieldIds = Object.keys(FIELDS);
  state.nodes.forEach(node => {
    drawNodeCircle(
      node.x, node.y,
      node.isRoot ? 36 : fieldIds.includes(node.id) ? 28 : 22,
      node.id,
      node.isRoot ? '#2A3566' : (node.field ? FIELDS[node.field].bg : 'rgba(123,159,224,0.13)'),
      node.field ? FIELDS[node.field].color : '#7B9FE0',
      node.label,
      node.isRoot,
      expandedNodes.has(node.id) && (node.projects||[]).length > 0,
      getNodeProgress(node)
    );
  });

  // ── 가상 노드 그리기 ──
  virtualNodes.forEach(vn => {
    const r = vn.type === 'project' ? 22 : vn.type === 'todo' ? 17 : 14;
    drawNodeCircle(
      vn.x, vn.y, r, vn.id,
      vn.bg, vn.color,
      vn.label,
      false,
      expandedNodes.has(vn.id),
      null
    );
  });

  // ── 확장 힌트 툴팁 (호버) ──
  if (hoveredNode) {
    const allNodes = getAllGraphNodes();
    const hn = allNodes.find(n => n.id === hoveredNode);
    if (hn && canExpand(hn)) {
      const s = worldToScreen(hn.x, hn.y);
      const r = getNodeRadius(hn) * camScale;
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font = `${10 * camScale}px 'Pretendard', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('더블클릭으로 펼치기', s.x, s.y + r + 14 * camScale);
      ctx.restore();
    }
  }
}

function getNodeRadius(n) {
  if (n.isRoot) return 36;
  if (n.type === 'project') return 22;
  if (n.type === 'todo')    return 17;
  if (n.type === 'plan')    return 14;
  const fieldIds = Object.keys(FIELDS);
  return fieldIds.includes(n.id) ? 28 : 22;
}

function getNodeProgress(node) {
  let total = 0, done = 0;
  (node.projects || []).forEach(p => {
    (p.todos || []).forEach(t => { total++; if (t.done) done++; });
  });
  (node.tasks || []).forEach(t => { total++; if (t.done) done++; });
  return total > 0 ? Math.round(done / total * 100) : null;
}

function canExpand(n) {
  if (n.type === 'project') return (n.ref.todos || []).length > 0;
  if (n.type === 'todo')    return (n.ref.plans || []).length > 0;
  if (n.type === 'plan')    return false;
  // 실제 노드
  if (n.isRoot) return false;
  return (n.projects || []).length > 0;
}

function getAllGraphNodes() {
  return [
    ...state.nodes.map(n => ({ ...n, _real: true })),
    ...virtualNodes
  ];
}

function drawNodeCircle(wx, wy, r, id, fillColor, strokeColor, label, isRoot, isExpanded, pct) {
  const s = worldToScreen(wx, wy);
  const sr = r * camScale;
  const isHov = hoveredNode === id;

  ctx.save();
  if (isHov) { ctx.shadowColor = strokeColor; ctx.shadowBlur = 16; }

  ctx.beginPath();
  ctx.arc(s.x, s.y, sr, 0, Math.PI * 2);
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = (isHov ? 2.5 : 1.5) * camScale;
  ctx.stroke();

  // 펼쳐진 노드 표시 — 외곽에 점선 링
  if (isExpanded) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, sr + 5 * camScale, 0, Math.PI * 2);
    ctx.strokeStyle = strokeColor;
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = 1 * camScale;
    ctx.setLineDash([3 * camScale, 3 * camScale]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // 라벨
  ctx.save();
  ctx.fillStyle = '#E8ECF8';
  ctx.font = `${Math.max(9, (isRoot ? 13 : r >= 22 ? 12 : r >= 17 ? 10 : 9)) * camScale}px 'Pretendard', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, s.x, s.y + (pct !== null ? -5 * camScale : 0));

  if (pct !== null) {
    ctx.font = `${9 * camScale}px 'Pretendard', sans-serif`;
    ctx.fillStyle = pct === 100 ? '#68C268' : strokeColor;
    ctx.fillText(`${pct}%`, s.x, s.y + 7 * camScale);
  }
  ctx.restore();
}

function bindGraphEvents() {
  // ── 더블클릭 감지용 ──
  let lastClickTime = 0, lastClickId = null;

  canvas.addEventListener('mousedown', e => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; });

  canvas.addEventListener('mouseup', e => {
    if (!isDragging) return;
    const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
    isDragging = false;
    if (Math.abs(dx) >= 5 || Math.abs(dy) >= 5) return; // 드래그면 무시

    const rect = canvas.getBoundingClientRect();
    const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    const hit = findNode(w.x, w.y);
    if (!hit) return;

    const now = Date.now();
    const isDouble = (now - lastClickTime < 350) && lastClickId === hit.id;
    lastClickTime = now;
    lastClickId = hit.id;

    if (isDouble) {
      // ── 더블클릭: 펼치기/접기 ──
      handleExpand(hit);
    } else {
      // ── 단일클릭: 패널 열기 ──
      const realId = hit._real ? hit.id : (hit.refNodeId || hit.id);
      openNodePanel(realId);
    }
  });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    if (isDragging) {
      camX += e.clientX - lastMouse.x;
      camY += e.clientY - lastMouse.y;
      lastMouse = { x: e.clientX, y: e.clientY };
    }
    const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    const hit = findNode(w.x, w.y);
    hoveredNode = hit ? hit.id : null;
    canvas.style.cursor = hit ? 'pointer' : (isDragging ? 'grabbing' : 'grab');
    drawGraph();
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(0.3, Math.min(3, camScale * delta));
    camX = mx - (mx - camX) * (newScale / camScale);
    camY = my - (my - camY) * (newScale / camScale);
    camScale = newScale;
    drawGraph();
  }, { passive: false });

  // ── 터치 지원 (더블탭도 처리) ──
  let lastTouch = null, lastDist = null;
  let lastTapTime = 0, lastTapId = null;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    if (e.touches.length === 2) lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && lastTouch) {
      camX += e.touches[0].clientX - lastTouch.x;
      camY += e.touches[0].clientY - lastTouch.y;
      lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      drawGraph();
    }
    if (e.touches.length === 2 && lastDist) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      camScale = Math.max(0.3, Math.min(3, camScale * (d / lastDist)));
      lastDist = d; drawGraph();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (e.changedTouches.length === 1 && lastTouch) {
      const rect = canvas.getBoundingClientRect();
      const t = e.changedTouches[0];
      const dx = Math.abs(t.clientX - lastTouch.x), dy = Math.abs(t.clientY - lastTouch.y);
      if (dx < 8 && dy < 8) {
        const w = screenToWorld(t.clientX - rect.left, t.clientY - rect.top);
        const hit = findNode(w.x, w.y);
        if (hit) {
          const now = Date.now();
          const isDouble = (now - lastTapTime < 400) && lastTapId === hit.id;
          lastTapTime = now; lastTapId = hit.id;
          if (isDouble) handleExpand(hit);
          else openNodePanel(hit._real ? hit.id : (hit.refNodeId || hit.id));
        }
      }
    }
    lastTouch = null; lastDist = null;
  });

  document.getElementById('zoom-in').addEventListener('click', () => { camScale = Math.min(3, camScale * 1.2); drawGraph(); });
  document.getElementById('zoom-out').addEventListener('click', () => { camScale = Math.max(0.3, camScale * 0.8); drawGraph(); });
  document.getElementById('zoom-reset').addEventListener('click', () => {
    camX = canvas.width / 2; camY = canvas.height / 2; camScale = 1;
    expandedNodes.clear(); virtualNodes = [];
    drawGraph();
  });
  document.getElementById('add-node-btn').addEventListener('click', () => openCapture());
}

/* ── 펼치기/접기 처리 ── */
function handleExpand(hit) {
  if (!canExpand(hit)) {
    showToast('더 이상 펼칠 하위 항목이 없습니다');
    return;
  }
  if (expandedNodes.has(hit.id)) {
    // 접기: 해당 노드와 모든 자손 가상 노드 id를 expandedNodes에서 제거
    collapseNode(hit.id);
  } else {
    expandedNodes.add(hit.id);
  }
  rebuildVirtualNodes();
  drawGraph();
}

function collapseNode(id) {
  expandedNodes.delete(id);
  // 이 노드를 parentId로 갖는 가상 노드들도 재귀로 접기
  virtualNodes.filter(v => v.parentId === id).forEach(v => collapseNode(v.id));
}

/* ── findNode: 실제 노드 + 가상 노드 모두 검색 ── */
function findNode(wx, wy) {
  // 가상 노드 먼저 (위에 그려지므로)
  for (const vn of [...virtualNodes].reverse()) {
    const r = vn.type === 'project' ? 22 : vn.type === 'todo' ? 17 : 14;
    if (Math.hypot(wx - vn.x, wy - vn.y) < r) return vn;
  }
  // 실제 노드
  for (const node of [...state.nodes].reverse()) {
    const r = node.isRoot ? 36 : 26;
    if (Math.hypot(wx - node.x, wy - node.y) < r) return { ...node, _real: true };
  }
  return null;
}

/* ═══════════════════════════════════════════════
   NODE DETAIL PANEL
   ═══════════════════════════════════════════════ */
let currentNodeId = null;

function openNodePanel(nodeId) {
  const node = getNode(nodeId);
  if (!node) return;
  currentNodeId = nodeId;
  const f = node.field ? FIELDS[node.field] : { color: '#7B9FE0', label: '기타' };

  document.getElementById('panel-dot').style.background = f.color;
  document.getElementById('panel-title').textContent = node.label;
  document.getElementById('panel-content').textContent = node.content || '—';

  renderPanelProgress(node);
  renderPanelProjects(node);
  renderConnected(node);

  document.getElementById('node-panel').classList.add('open');
  if (!document.getElementById('graph-view').classList.contains('active')) {
    document.querySelector('[data-view="graph-view"]').click();
  }
}

function renderPanelProgress(node) {
  let total = 0, done = 0;
  // 계층형 projects 구조 기반 진행률
  (node.projects || []).forEach(proj => {
    (proj.todos || []).forEach(todo => {
      total++;
      if (todo.done) done++;
      (todo.plans || []).forEach(plan => {
        total++;
        if (plan.done) done++;
      });
    });
  });
  // fallback: 구 tasks
  if (total === 0 && node.tasks && node.tasks.length > 0) {
    total = node.tasks.length;
    done = node.tasks.filter(t => t.done).length;
  }
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  const fill = document.getElementById('panel-prog-fill');
  fill.style.width = pct + '%';
  const color = node.field ? FIELDS[node.field].color : '#7B9FE0';
  fill.style.background = pct === 100 ? '#68C268' : color;
  document.getElementById('panel-prog-text').textContent = `${done} / ${total} 완료`;
  document.getElementById('panel-prog-pct').textContent = pct + '%';
}

/* ── 계층형 프로젝트 트리 렌더링 ──
   구조: 프로젝트 > 할 일 > 세부 계획 > 메모 (최대 4단계, 5번째는 메모 추가)
*/
function renderPanelProjects(node) {
  const container = document.getElementById('panel-projects');
  if (!container) return;
  container.innerHTML = '';
  const color = node.field ? FIELDS[node.field].color : '#7B9FE0';
  const projects = node.projects || [];

  if (projects.length === 0) {
    container.innerHTML = `<div style="color:var(--text3);font-size:12px;padding:8px 0">프로젝트가 없습니다. ＋ 프로젝트 버튼으로 추가하세요.</div>`;
  }

let selectedField = 'work';

function openCapture() {
  document.getElementById('capture-overlay').classList.add('open');
  document.getElementById('capture-input').value = '';
  renderCaptureChips(); // 버튼 생성 후 disabled 상태는 renderCaptureChips 안에서 처리됨
  setTimeout(() => document.getElementById('capture-input').focus(), 50);
}
function closeCapture() { document.getElementById('capture-overlay').classList.remove('open'); }

document.getElementById('open-capture-btn').addEventListener('click', openCapture);
document.getElementById('capture-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeCapture(); });

function renderCaptureChips() {
  const footer = document.getElementById('capture-footer-chips');
  if (!footer) return;
  footer.innerHTML = '';

  Object.entries(FIELDS).forEach(([key, f]) => {
    const btn = document.createElement('button');
    const isSel = key === selectedField;
    btn.className = `field-chip${isSel ? ' sel' : ''}`;
    if (isSel) btn.style.cssText = `background:${f.color};color:${luminance(f.color)<0.5?'#fff':'#222'};border-color:transparent`;
    btn.dataset.field = key;
    btn.textContent = f.icon + ' ' + f.label;
    btn.addEventListener('click', () => { selectedField = key; renderCaptureChips(); });
    footer.appendChild(btn);
  });

  // 저장 버튼을 새로 생성 (innerHTML 초기화로 사라지므로)
  const saveBtn = document.createElement('button');
  saveBtn.id = 'capture-save';
  saveBtn.className = 'save-btn';
  saveBtn.style.marginLeft = 'auto';
  saveBtn.textContent = '저장';
  saveBtn.disabled = (document.getElementById('capture-input')?.value?.trim() === '' ?? true);
  saveBtn.addEventListener('click', saveCapture);
  footer.appendChild(saveBtn);
}

const captureInput = document.getElementById('capture-input');
captureInput.addEventListener('input', () => {
  const saveBtn = document.querySelector('#capture-footer-chips .save-btn');
  if (saveBtn) saveBtn.disabled = captureInput.value.trim() === '';
});
captureInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && captureInput.value.trim()) saveCapture();
  if (e.key === 'Escape') closeCapture();
});

function saveCapture() {
  const text = captureInput.value.trim();
  if (!text) return;
  const f = FIELDS[selectedField];
  const parentNode = getNode(selectedField);
  const newId = 'node-' + Date.now();
  const angle = Math.random() * Math.PI * 2;
  const dist = 140 + Math.random() * 80;
  const px = parentNode ? parentNode.x : 0;
  const py = parentNode ? parentNode.y : 0;
  const newNode = {
    id: newId, label: text.length > 8 ? text.slice(0, 8) + '…' : text,
    field: selectedField, content: text,
    tasks: [], connectedIds: [selectedField],
    x: px + Math.cos(angle) * dist, y: py + Math.sin(angle) * dist
  };
  if (parentNode) {
    updateNode(selectedField, { connectedIds: [...new Set([...parentNode.connectedIds, newId])] });
  }
  state.nodes.push(newNode);
  saveData();
  closeCapture();
  renderCardView();
  drawGraph();
  showToast(`"${newNode.label}" 노드가 ${f.label}에 추가되었습니다`);
  setTimeout(() => openNodePanel(newId), 300);
}

};

const DEFAULT_KANBAN_COLS = [{ id:'todo', name:'할 일', color:'#8E98CC' }, { id:'doing', name:'진행 중', color:'#A8C4FF' }, { id:'review', name:'검토', color:'#FFCA6E' }, { id:'done', name:'완료', color:'#7ED67E' }];
function getKanbanCols(field) { return KANBAN_COLS[field] || DEFAULT_KANBAN_COLS; }

let currentKanbanField = 'yt';
let dragCard = null, dragFromCol = null;

function renderKanbanSelector() {
  const sel = document.getElementById('kanban-selector');
  sel.innerHTML = '';
  Object.entries(FIELDS).forEach(([key, f]) => {
    const btn = document.createElement('button');
    const isActive = key === currentKanbanField;
    btn.className = `kanban-tab${isActive ? ' active' : ''}`;
    btn.style.cssText = isActive ? `background:${f.color};color:${luminance(f.color)<0.4?'#fff':'#222'};border-color:transparent` : '';
    btn.textContent = f.icon + ' ' + f.label;
    btn.addEventListener('click', () => { currentKanbanField = key; renderKanban(); });
    sel.appendChild(btn);
  });
}

function luminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  return 0.299*r + 0.587*g + 0.114*b;
}

/* ── projects → 칸반 col 매핑 ── */
function projStatusToCol(status) {
  if (status === 'done')  return 'done';
  if (status === 'doing') return 'doing';
  if (status === 'review') return 'review';
  return 'todo';
}
function colToStatus(colId) {
  if (colId === 'done')   return 'done';
  if (colId === 'doing')  return 'doing';
  if (colId === 'review') return 'review';
  return 'todo';
}

/* ── projects 전체 수집 (현재 분야의 모든 노드) ── */
function getProjectsForField(field) {
  const result = [];
  state.nodes.filter(n => n.field === field).forEach(node => {
    (node.projects || []).forEach(proj => {
      result.push({ ...proj, _nodeId: node.id, _nodeLabel: node.label });
    });
  });
  return result;
}

function renderKanban() {
  renderKanbanSelector();
  const board = document.getElementById('kanban-board');
  board.innerHTML = '';
  const cols = getKanbanCols(currentKanbanField);

  // projects 기반으로 카드 목록 생성
  const allProjects = getProjectsForField(currentKanbanField);

  cols.forEach(col => {
    const colProjects = allProjects.filter(p => projStatusToCol(p.status) === col.id);
    const colEl = document.createElement('div');
    colEl.className = 'kanban-col';
    colEl.dataset.col = col.id;

    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-dot" style="background:${col.color}"></div>
        <div class="col-name">${col.name}</div>
        <div class="col-count">${colProjects.length}</div>
      </div>
      <div class="col-cards" data-col="${col.id}"></div>
      <div class="col-add"><button class="col-add-btn" data-col="${col.id}">＋ 추가</button></div>
    `;
    board.appendChild(colEl);

    const cardsEl = colEl.querySelector('.col-cards');
    colProjects.forEach(proj => {
      cardsEl.appendChild(buildKanbanCard(proj, col));
    });

    // 드래그 드롭 → proj.status 직접 업데이트
    colEl.addEventListener('dragover', e => { e.preventDefault(); colEl.classList.add('drag-over'); });
    colEl.addEventListener('dragleave', () => colEl.classList.remove('drag-over'));
    colEl.addEventListener('drop', e => {
      e.preventDefault();
      colEl.classList.remove('drag-over');
      if (!dragCard) return;
      // dragCard = { nodeId, projId }
      const node = getNode(dragCard.nodeId);
      if (!node) return;
      const proj = (node.projects || []).find(p => p.id === dragCard.projId);
      if (!proj) return;
      proj.status = colToStatus(col.id);
      saveData();
      renderKanban();
      // 업무 패널이 열려있으면 동기화
      if (currentNodeId) renderPanelProjects(getNode(currentNodeId));
      showToast(`"${proj.title}"을 "${col.name}"으로 이동했습니다`);
    });

    colEl.querySelector('.col-add-btn').addEventListener('click', () => openKanbanAddModal(col.id));
  });
}

function buildKanbanCard(proj, col) {
  const el = document.createElement('div');
  el.className = 'kanban-card';
  el.draggable = true;
  const f = FIELDS[currentKanbanField];

  // 할 일 진행률 계산
  const todos = proj.todos || [];
  const totalTodos = todos.length;
  const doneTodos = todos.filter(t => t.done).length;
  const pct = totalTodos > 0 ? Math.round(doneTodos / totalTodos * 100) : null;

  el.innerHTML = `
    <div class="kc-title">${proj.title}</div>
    ${proj._nodeLabel ? `<div class="kc-tags"><span class="kc-tag" style="background:${f.color}22;color:${f.color}">${proj._nodeLabel}</span></div>` : ''}
    ${pct !== null ? `
      <div class="kc-prog">
        <div class="kc-prog-label">${doneTodos}/${totalTodos} 할 일 완료</div>
        <div class="kc-prog-bar"><div class="kc-prog-fill" style="width:${pct}%;background:${pct===100?'#68C268':f.color}"></div></div>
      </div>` : ''}
  `;

  el.addEventListener('dragstart', () => {
    dragCard = { nodeId: proj._nodeId, projId: proj.id };
    el.classList.add('dragging');
  });
  el.addEventListener('dragend', () => {
    dragCard = null;
    el.classList.remove('dragging');
    document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
  });

  // 클릭 → 해당 노드 패널 열기
  el.addEventListener('click', () => {
    openNodePanel(proj._nodeId);
    showToast(`"${proj.title}" 프로젝트를 업무 보드에서 확인하세요`);
  });

  // 터치
  let touchStart = null;
  el.addEventListener('touchstart', e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
  el.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = Math.abs(e.changedTouches[0].clientX - touchStart.x);
    const dy = Math.abs(e.changedTouches[0].clientY - touchStart.y);
    if (dx < 8 && dy < 8) openNodePanel(proj._nodeId);
    touchStart = null;
  });

  return el;
}

/* ── 칸반에서 새 프로젝트 추가 → 해당 분야 기본 노드에 저장 ── */
function openKanbanAddModal(defaultColId) {
  const name = prompt('프로젝트 이름을 입력하세요:');
  if (!name || !name.trim()) return;
  // 현재 분야의 최상위 노드(분야 노드 자체)에 추가
  const fieldNode = getNode(currentKanbanField);
  if (!fieldNode) { showToast('분야 노드를 찾을 수 없습니다'); return; }
  if (!fieldNode.projects) fieldNode.projects = [];
  fieldNode.projects.push({
    id: 'wp' + Date.now(),
    title: name.trim(),
    status: colToStatus(defaultColId),
    todos: []
  });
  saveData();
  renderKanban();
  showToast(`"${name.trim()}" 프로젝트가 추가되었습니다`);
}

// Kanban card modal — 이제 openKanbanAddModal로 대체됨 (하위 호환용 stub)
let editingCardId = null, editingCardColDefault = null;

/* ═══════════════════════════════════════════════
   CALENDAR
   ═══════════════════════════════════════════════ */
const today = new Date();
let calYear = today.getFullYear(), calMonth = today.getMonth();
let activeFilters = new Set();

function renderCalFilters() {
  const el = document.getElementById('cal-filters');
  el.innerHTML = '';
  Object.entries(FIELDS).forEach(([key, f]) => {
    const isOn = activeFilters.has(key);
    const btn = document.createElement('button');
    btn.className = `cal-filter${isOn ? ' on' : ''}`;
    if (isOn) btn.style.cssText = `background:${f.color};color:${luminance(f.color)<0.5?'#fff':'#222'};border-color:transparent`;
    btn.dataset.field = key;
    btn.innerHTML = `<span class="cal-filter-dot" style="background:${isOn?'rgba(255,255,255,0.7)':f.color}"></span>${f.label}`;
    btn.addEventListener('click', () => {
      if (activeFilters.has(key)) { if (activeFilters.size > 1) activeFilters.delete(key); }
      else activeFilters.add(key);
      renderCalFilters(); renderCalGrid();
    });
    el.appendChild(btn);
  });
}

function renderCalHeader() {
  document.getElementById('cal-month-label').textContent =
    `${calYear}년 ${calMonth+1}월`;
}

function renderCalGrid() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const todayStr = today.toISOString().slice(0,10);
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let day, month, year, isOther = false;
    if (i < firstDay) { day = daysInPrev - firstDay + 1 + i; month = calMonth - 1; year = calYear; isOther = true; }
    else if (i >= firstDay + daysInMonth) { day = i - firstDay - daysInMonth + 1; month = calMonth + 1; year = calYear; isOther = true; }
    else { day = i - firstDay + 1; month = calMonth; year = calYear; }
    const realMonth = ((month % 12) + 12) % 12;
    const realYear = year + Math.floor(month / 12);
    const dateStr = `${realYear}-${String(realMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;

    const cell = document.createElement('div');
    cell.className = `cal-day${isOther?' other-month':''}${isToday?' today':''}`;
    cell.innerHTML = `<div class="day-num">${day}</div>`;

    // Events
    const dayEvents = (state.events || []).filter(ev => ev.date === dateStr && activeFilters.has(ev.field));
    const shown = dayEvents.slice(0, 3);
    shown.forEach(ev => {
      const f = FIELDS[ev.field];
      const evEl = document.createElement('div');
      evEl.className = 'cal-event';
      evEl.style.cssText = `background:${f.color}22;color:${f.color}`;
      evEl.textContent = ev.title;
      evEl.addEventListener('click', e => { e.stopPropagation(); openEventModal(ev, dateStr); });
      cell.appendChild(evEl);
    });
    if (dayEvents.length > 3) {
      const more = document.createElement('div');
      more.className = 'cal-more'; more.textContent = `+${dayEvents.length-3}개 더`;
      cell.appendChild(more);
    }

    cell.addEventListener('click', () => openEventModal(null, dateStr));
    grid.appendChild(cell);
  }
}

document.getElementById('cal-prev').addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalHeader(); renderCalGrid(); });
document.getElementById('cal-next').addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalHeader(); renderCalGrid(); });
document.getElementById('cal-today-btn').addEventListener('click', () => { calYear=today.getFullYear(); calMonth=today.getMonth(); renderCalHeader(); renderCalGrid(); });

/* ═══════════════════════════════════════════════
   EVENT / CARD MODAL (공용)
   ═══════════════════════════════════════════════ */
let editingEventId = null;

function openEventModal(ev, dateStr) {
  editingEventId = ev ? ev.id : null;
  document.getElementById('event-modal-title').textContent = ev ? '일정 편집' : '일정 추가';
  document.getElementById('event-name').value = ev ? ev.title : '';
  document.getElementById('event-field').value = ev ? ev.field : 'work';
  document.getElementById('event-date').style.display = '';
  document.getElementById('event-date').value = ev ? ev.date : (dateStr || getTodayPlus(0));
  document.getElementById('event-note').value = ev ? (ev.note || '') : '';
  document.getElementById('event-delete').style.display = ev ? 'block' : 'none';
  document.getElementById('event-modal-overlay').dataset.mode = 'event';
  document.getElementById('event-modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('event-name').focus(),60);
}

function closeEventModal() { document.getElementById('event-modal-overlay').classList.remove('open'); editingEventId=null; editingCardId=null; }

document.getElementById('event-cancel').addEventListener('click', closeEventModal);
document.getElementById('event-modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeEventModal(); });

document.getElementById('event-save').addEventListener('click', () => {
  const mode = document.getElementById('event-modal-overlay').dataset.mode;
  const name = document.getElementById('event-name').value.trim();
  if (!name) { showToast('제목을 입력하세요'); return; }
  const field = document.getElementById('event-field').value;
  const note = document.getElementById('event-note').value.trim();

  // 달력 일정 저장만 담당 (칸반은 openKanbanAddModal에서 직접 처리)
  const date = document.getElementById('event-date').value;
  if (!state.events) state.events = [];
  if (editingEventId) {
    const idx = state.events.findIndex(e => e.id === editingEventId);
    if (idx >= 0) state.events[idx] = { ...state.events[idx], title: name, field, date, note };
  } else {
    state.events.push({ id: 'ev' + Date.now(), title: name, field, date, note });
  }
  saveData(); closeEventModal(); renderCalGrid();
  showToast(editingEventId ? '일정이 수정되었습니다' : '일정이 추가되었습니다');
});

document.getElementById('event-delete').addEventListener('click', () => {
  if (editingEventId) {
    state.events = state.events.filter(e => e.id !== editingEventId);
    saveData(); closeEventModal(); renderCalGrid(); showToast('일정이 삭제되었습니다');
  }
});

/* ─── INIT ─── */
syncFields();
Object.keys(FIELDS).forEach(k => activeFilters.add(k));
renderCardView();
renderCaptureChips();
renderKanban();
renderCalFilters();
renderCalHeader();
renderCalGrid();
</script>
